# ============================================================
# PREFIX & RELOAD
# ============================================================
unbind C-b
set -g prefix C-s
set -g prefix2 C-a
bind C-a send-prefix -2
unbind r
bind r source-file ~/.tmux.conf \; display-message "  config reloaded"

# ============================================================
# GENERAL
# ============================================================
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-window on
set -g allow-rename off
set -g status-interval 5
set -s set-clipboard on
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 10000
set -g set-titles on
set -g set-titles-string "#S / #W"

# ============================================================
# TERMINAL
# ============================================================
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# ============================================================
# PANE NAVIGATION
# ============================================================
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ============================================================
# ROSE PINE MOON COLORS
# ============================================================
# base      = #232136
# surface   = #2a273f
# overlay   = #393552
# muted     = #6e6a86
# subtle    = #908caa
# text      = #e0def4
# love      = #eb6f92
# gold      = #f6c177
# rose      = #ea9a97
# pine      = #3e8fb0
# foam      = #9ccfd8
# iris      = #c4a7e7

# ============================================================
# STATUS BAR
# ============================================================
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#232136,fg=#e0def4"
set -g status-left-length 40
set -g status-right-length 120

# Left: session name
set -g status-left "#[fg=#232136,bg=#3e8fb0,bold]  #S #[fg=#3e8fb0,bg=#232136]"

# Right: CPU + battery + time
set -g status-right "#[fg=#6e6a86] #{cpu_percentage} 󰍛  #{battery_percentage} 󰁹 #[fg=#393552,bg=#232136]#[fg=#908caa,bg=#393552] %H:%M #[fg=#3e8fb0,bg=#393552]#[fg=#232136,bg=#3e8fb0,bold] #H "

# Window status
set -g window-status-separator ""
set -g window-status-format "#[fg=#232136,bg=#2a273f]#[fg=#6e6a86,bg=#2a273f] #I  #W #[fg=#2a273f,bg=#232136]"
set -g window-status-current-format "#[fg=#232136,bg=#ea9a97]#[fg=#232136,bg=#ea9a97,bold] #I  #W #[fg=#ea9a97,bg=#232136]"

# Pane borders
set -g pane-border-style "fg=#393552"
set -g pane-active-border-style "fg=#3e8fb0"
set -g pane-border-lines single

# Message style
set -g message-style "fg=#f6c177,bg=#232136,bold"
set -g message-command-style "fg=#f6c177,bg=#232136"

# Mode style (copy mode highlight)
set -g mode-style "fg=#232136,bg=#c4a7e7,bold"

# ============================================================
# COPY MODE
# ============================================================
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "xclip -selection clipboard -i"
bind-key -T copy-mode-vi 'r' send -X rectangle-toggle
bind Enter copy-mode

# ============================================================
# KEYBINDS
# ============================================================
set-window-option -g xterm-keys on
bind-key -n M-Left send-keys M-b
bind-key -n M-Right send-keys M-f
bind R command-prompt -I "#W" "rename-window '%%'"

# ============================================================
# PLUGINS
# ============================================================
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.local/share/tmux/plugins"
if 'test ! -d "$TMUX_PLUGIN_MANAGER_PATH/tpm"' \
  "run 'mkdir -p \"$TMUX_PLUGIN_MANAGER_PATH\"; \
        git clone https://github.com/tmux-plugins/tpm \"$TMUX_PLUGIN_MANAGER_PATH/tpm\"'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'dreknix/tmux-primary-ip'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'alexwforsythe/tmux-which-key'

# Plugin config
set -g @yank_selection_mouse 'clipboard'
set -g @yank_action 'copy-pipe-and-cancel'
set -g @continuum-restore 'on'
set -g @resurrect-strategy-vim 'session'

# CPU plugin colors
set -g @cpu_low_fg_color "#[fg=#9ccfd8]"
set -g @cpu_medium_fg_color "#[fg=#f6c177]"
set -g @cpu_high_fg_color "#[fg=#eb6f92]"

# Battery plugin
set -g @batt_icon_charge_tier8 '󰁹'
set -g @batt_icon_charge_tier7 '󰂀'
set -g @batt_icon_charge_tier6 '󰁿'
set -g @batt_icon_charge_tier5 '󰁾'
set -g @batt_icon_charge_tier4 '󰁽'
set -g @batt_icon_charge_tier3 '󰁼'
set -g @batt_icon_charge_tier2 '󰁻'
set -g @batt_icon_charge_tier1 '󰁺'
set -g @batt_icon_status_charging '󰂄'

run "$TMUX_PLUGIN_MANAGER_PATH/tpm/tpm"
bind -n C-l send-keys C-l
