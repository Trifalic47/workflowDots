# ============================================================
# PREFIX & RELOAD
# ============================================================

unbind C-b
set -g prefix C-s
set -g prefix2 C-a
bind C-a send-prefix -2

unbind r
bind r source-file ~/.tmux.conf \; display-message "[ config reloaded ]"

# ============================================================
# GENERAL
# ============================================================

set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-window on
set -g allow-rename off
set -g status-interval 5

# Proper terminal support (modern way)
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# ============================================================
# PANE NAVIGATION
# ============================================================

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# ============================================================
# APPEARANCE (CATPPUCCIN MOCHA)
# ============================================================

# Status bar configuration
set -g status on
set -g status-position top
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Window status formatting
set -g window-status-separator ""
set -g window-status-format " #[fg=#6c7086]#I:#W "
set -g window-status-current-format " #[fg=#1e1e2e,bg=#cba6f7,bold] #I:#W "

# Status left and right
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[bg=default,fg=default] "
set -g status-right "#[fg=#bac2de,bg=#313244] %H:%M #[fg=#1e1e2e,bg=#a6e3a1,bold] %d-%m-%Y "

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"

# Message style
set -g message-style "fg=#cba6f7,bg=#313244,bold"

# ============================================================
# PLUGINS
# ============================================================

set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.local/share/tmux/plugins"

if 'test ! -d "$TMUX_PLUGIN_MANAGER_PATH/tpm"' \
  "run 'mkdir -p \"$TMUX_PLUGIN_MANAGER_PATH\"; \
        git clone https://github.com/tmux-plugins/tpm \"$TMUX_PLUGIN_MANAGER_PATH/tpm\"'"

# TPM
set -g @plugin 'tmux-plugins/tpm'

# Core Plugins
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'dreknix/tmux-primary-ip'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'alexwforsythe/tmux-which-key'

# Auto-save & restore across reboot
set -g @continuum-restore 'on'
set -g @resurrect-strategy-vim 'session'

run "$TMUX_PLUGIN_MANAGER_PATH/tpm/tpm"
