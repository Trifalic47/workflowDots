# ============================================================
# PREFIX & RELOAD
# ============================================================

unbind C-b
set -g prefix C-s
set -g prefix2 C-a
bind C-a send-prefix -2

unbind r
bind r source-file ~/.tmux.conf \; display-message "[ config reloaded ]"

# ============================================================
# GENERAL
# ============================================================

set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-window on
set -g allow-rename off
set -g status-interval 5

# OSC 52 clipboard support (Kitty supports this)
set -s set-clipboard on

# Proper terminal support (modern way)
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# ============================================================
# PANE NAVIGATION
# ============================================================

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# ============================================================
# APPEARANCE (PRIMEAGEN STYLE)
# ============================================================

set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#333333,fg=#5eacd3"

# Status left: [session_name]
set -g status-left-length 20
set -g status-left "[#S] "

# Status right: "hostname" HH:MM DD-Mon-YY
set -g status-right-length 50
set -g status-right "\"#H\" %H:%M %d-%b-%y "

# Window status formatting
set -g window-status-separator " "
set -g window-status-format "#[fg=#5eacd3]#I:#W#F"
set -g window-status-current-format "#[fg=white,bold]#I:#W#F"

# Pane borders
set -g pane-border-style "fg=#444444"
set -g pane-active-border-style "fg=#5eacd3"

# Message style
set -g message-style "fg=#333333,bg=#5eacd3,bold"

# ============================================================
# PLUGINS
# ============================================================

set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.local/share/tmux/plugins"

if 'test ! -d "$TMUX_PLUGIN_MANAGER_PATH/tpm"' \
  "run 'mkdir -p \"$TMUX_PLUGIN_MANAGER_PATH\"; \
        git clone https://github.com/tmux-plugins/tpm \"$TMUX_PLUGIN_MANAGER_PATH/tpm\"'"

# TPM
set -g @plugin 'tmux-plugins/tpm'

# Core Plugins
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'dreknix/tmux-primary-ip'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'alexwforsythe/tmux-which-key'

# tmux-yank configuration
set -g @yank_selection_mouse 'clipboard'
set -g @yank_action 'copy-pipe-and-cancel'

# Auto-save & restore across reboot
set -g @continuum-restore 'on'
set -g @resurrect-strategy-vim 'session'

run "$TMUX_PLUGIN_MANAGER_PATH/tpm/tpm"
