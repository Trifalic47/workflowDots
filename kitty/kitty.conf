# Background & foreground
background #0d0f12
foreground #d4d4d4

# Cursor
cursor #c5c8c6
cursor_text_color #0d0f12

# Selection
selection_background #3a3f4b
selection_foreground #ffffff

# Black
color0  #1c1f24
color8  #5c6370

# Red
color1  #e06c75
color9  #be5046

# Green
color2  #98c379
color10 #7ec07e

# Yellow
color3  #e5c07b
color11 #d19a66

# Blue (important for paths like your screenshot)
color4  #61afef
color12 #528bff

# Magenta
color5  #c678dd
color13 #a626a4

# Cyan
color6  #56b6c2
color14 #4db5bd

# White
color7  #dcdfe4
color15 #ffffff


# Window look
background_opacity 0.95
window_padding_width 10
line_height 1.1

# Cursor style
cursor_shape block
cursor_blink_interval 0.5

# Scrollback
scrollback_lines 10000

# Disable bell (you’re not a noob)
enable_audio_bell no
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0
font_features JetBrainsMonoNFM-Regular +liga +calt
