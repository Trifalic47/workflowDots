# uosc configuration file
# Use 'uosc' as the UI
timeline_size=32
timeline_border=1
timeline_step_delay=200
timeline_persist=no
timeline_style=bar
timeline_line_width=2
timeline_size_min=2
timeline_size_max=40

# Volume
volume_size=32
volume_border=1
volume_step_delay=200
volume_persist=no

# UI Colors
# (Using default uosc colors which are modern)

# Controls
controls=play_pause,menu,gap,subtitles,audio,video,gap,fullscreen
