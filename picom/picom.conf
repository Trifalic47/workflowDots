# ===========================
# BACKEND
# ===========================
backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;
use-damage = true;

# ===========================
# BLUR
# ===========================
blur: {
  method = "dual_kawase";
  strength = 4;
  background = true;
  background-frame = false;
  background-fixed = false;
}

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Maim'",
];

# ===========================
# OPACITY
# ===========================
active-opacity = 1.0;
inactive-opacity = 0.92;
frame-opacity = 1.0;
inactive-opacity-override = false;

opacity-rule = [
  "92:class_g = 'kitty' && focused",
  "80:class_g = 'kitty' && !focused",
  "85:class_g = 'Polybar'",
];

# ===========================
# CORNERS
# ===========================
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
];

# ===========================
# SHADOWS
# ===========================
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.4;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Polybar'",
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c",
];

# ===========================
# FADING
# ===========================
fading = false;

# ===========================
# PERFORMANCE
# ===========================
unredir-if-possible = true;
unredir-if-possible-exclude = [];
paint-exclude = [ "class_g = 'Maim'" ];

# ===========================
# WINDOW TYPE RULES
# ===========================
wintypes: {
  tooltip = { fade = false; shadow = false; opacity = 0.9; focus = true; };
  dock = { shadow = false; clip-shadow-above = true; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.95; };
  dropdown_menu = { opacity = 0.95; };
};
