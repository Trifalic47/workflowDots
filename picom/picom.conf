#backend = "glx";
#vsync = true;
#glx-use-copysubbuffer-mesa = true;
#
#glx-copy-from-front = true;
#glx-swap-method = 2;
#xrender-sync = true;
#xrender-sync-fence = true;

# Backend to use (GLX is required for Kawase blur)
backend = "glx";

# Blur settings
blur: {
  method = "dual_kawase";
  strength = 5;      # Adjust this for more/less blur
  background = true;
  background-frame = false;
  background-fixed = false;
}

# Ensure windows are actually transparent so you can see the blur
opacity-rule = [
  "95:class_g = 'kitty' && focused",
  "95:class_g = 'kitty' && !focused",
  "90:class_g = 'Polybar'"
];

# Corner rounding (for that modern look)
corner-radius = 1;
