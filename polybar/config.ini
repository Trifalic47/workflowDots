;==========================================================
;
;   POLYBAR CONFIG (ADWAITA DARKER THEME)
;
;==========================================================

[colors]
; Adwaita Darker Palette
background = #1e1e1e
background-alt = #303030
foreground = #ffffff
foreground-alt = #eeeeec

; GNOME Accents
blue = #3584e4
red = #e01b24
green = #26a269
yellow = #e5a50a
orange = #e66100
purple = #9141ac

primary = ${colors.blue}
secondary = ${colors.background-alt}
alert = ${colors.red}
disabled = #666666

;==========================================================

[bar/toph]
monitor = ${env:MONITOR:}
width = 100%
height = 15pt
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

bottom = true

line-size = 2pt
border-size = 0
border-color = #00000000

padding-left = 1
padding-right = 1

module-margin = 1

separator = " "
separator-foreground = ${colors.disabled}

font-0 = "MesloLGS Nerd Font Mono:size=11;3"

modules-left = xworkspaces xwindow
modules-right = pulseaudio cpu-temp memory cpu wlan date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

;==========================================================

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.primary}
label-active-foreground = ${colors.background}
label-active-padding = 1

label-occupied = %name%
label-occupied-background = ${colors.background-alt}
label-occupied-foreground = ${colors.foreground-alt}
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

;==========================================================

[module/xwindow]
type = internal/xwindow
label = %title:0:45:...%
label-foreground = ${colors.foreground-alt}

;==========================================================

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <label-volume>
format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume-background = ${colors.background-alt}
format-volume-padding = 1

label-volume = %percentage%%
label-volume-foreground = ${colors.foreground}

label-muted = "muted"
label-muted-background = ${colors.background-alt}
label-muted-padding = 1
label-muted-foreground = ${colors.disabled}

;==========================================================

[module/memory]
type = internal/memory
interval = 2

format = <label>
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
format-background = ${colors.background-alt}
format-padding = 1

label = %percentage_used%%

;==========================================================

[module/cpu]
type = internal/cpu
interval = 2

format = <label>
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
format-background = ${colors.background-alt}
format-padding = 1

label = %percentage%%

;==========================================================

[module/cpu-temp]
type = internal/temperature
interval = 2

thermal-zone = 0
warn-temperature = 75

format = <label>
format-prefix = "TEMP "
format-prefix-foreground = ${colors.primary}
format-background = ${colors.background-alt}
format-padding = 1

format-warn = <label-warn>
format-warn-prefix = "TEMP "
format-warn-prefix-foreground = ${colors.alert}
format-warn-background = ${colors.background-alt}
format-warn-padding = 1

label = %temperature-c%
label-warn = %temperature-c%
label-warn-foreground = ${colors.alert}

;==========================================================

[network-base]
type = internal/network
interval = 5

format-connected = <label-connected>
format-connected-background = ${colors.background-alt}
format-connected-padding = 1

format-disconnected = <label-disconnected>
format-disconnected-background = ${colors.background-alt}
format-disconnected-padding = 1

label-disconnected = "offline"
label-disconnected-foreground = ${colors.disabled}

;==========================================================

[module/wlan]
inherit = network-base
interface-type = wireless

format-connected = <label-connected>
format-connected-prefix = "WIFI "
format-connected-prefix-foreground = ${colors.primary}
format-connected-background = ${colors.background-alt}
format-connected-padding = 1
label-connected = %essid%

;==========================================================

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

format = <label>
format-background = ${colors.background-alt}
format-padding = 1

label = %date%
label-foreground = ${colors.foreground}

;==========================================================

[settings]
screenchange-reload = true
pseudo-transparency = true
